<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pantalla de DM para Maldición de Strahd — Soundboard, Iniciativa y Mapa interactivo">
  <title>Maldición de Strahd — Pantalla del DM</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ══════════════════════════════════════════════════════
       NAVEGACIÓN PRINCIPAL
  ══════════════════════════════════════════════════════ -->
  <nav id="main-nav" role="navigation" aria-label="Módulos de la pantalla del DM">
    <div class="nav-brand" aria-label="Maldición de Strahd — Pantalla del DM">
      ☽ Maldición de <span>Strahd</span>
    </div>

    <ul class="nav-tabs" role="tablist">
      <li>
        <button class="nav-tab active" role="tab" aria-selected="true"
          data-view="soundboard" aria-controls="view-soundboard">
          ♪ Soundboard
        </button>
      </li>
      <li>
        <button class="nav-tab" role="tab" aria-selected="false"
          data-view="initiative" aria-controls="view-initiative">
          ⚔ Iniciativa
        </button>
      </li>
      <li>
        <button class="nav-tab" role="tab" aria-selected="false"
          data-view="map" aria-controls="view-map">
          ✦ Mapa
        </button>
      </li>
    </ul>
  </nav>

  <!-- ══════════════════════════════════════════════════════
       CONTENEDOR PRINCIPAL
  ══════════════════════════════════════════════════════ -->
  <main id="app-container">

    <!-- ─────────────────────────────────────────────────
         VISTA: SOUNDBOARD
    ───────────────────────────────────────────────── -->
    <section id="view-soundboard" class="view active" role="tabpanel" aria-labelledby="tab-soundboard">

      <div class="section-header">
        <span class="section-icon">♪</span>
        <h2>Soundboard de Ambiente</h2>
      </div>

      <!-- Categorías -->
      <div id="sb-categories" class="sb-categories" role="group" aria-label="Categorías de sonido"></div>

      <!-- Grid de cards -->
      <div id="sb-grid" class="sb-grid" role="list" aria-label="Pistas de sonido"></div>

    </section>

    <!-- ─────────────────────────────────────────────────
         VISTA: INICIATIVA
    ───────────────────────────────────────────────── -->
    <section id="view-initiative" class="view" role="tabpanel" aria-labelledby="tab-initiative">

      <div class="section-header">
        <span class="section-icon">⚔</span>
        <h2>Tracker de Iniciativa</h2>
      </div>

      <!-- Panel de añadir combatiente -->
      <div class="add-combatant-panel">
        <h3>Añadir Combatiente</h3>
        <form id="combatant-form" class="combatant-form" onsubmit="return false;">
          <div class="form-group">
            <label for="c-name">Nombre</label>
            <input type="text" id="c-name" class="input-field" placeholder="Ej: Strahd von Zarovich" autocomplete="off" maxlength="40">
          </div>
          <div class="form-group">
            <label for="c-init">Iniciativa</label>
            <input type="number" id="c-init" class="input-field" placeholder="20" min="-5" max="30" style="text-align:center;">
          </div>
          <div class="form-group">
            <label for="c-hp">PV Máx</label>
            <input type="number" id="c-hp" class="input-field" placeholder="100" min="1" max="9999" style="text-align:center;">
          </div>
          <div class="form-group">
            <label for="c-type">Tipo</label>
            <select id="c-type" class="input-field">
              <option value="enemy">Enemigo</option>
              <option value="ally">Aliado</option>
              <option value="neutral">Neutral</option>
            </select>
          </div>
          <div class="form-group" style="display:flex;align-items:flex-end;">
            <button type="button" id="c-add-btn" class="btn btn-primary" style="width:100%;">
              + Añadir
            </button>
          </div>
        </form>
      </div>

      <!-- Layout principal de iniciativa -->
      <div class="initiative-layout">

        <!-- Columna izquierda: controles y lista -->
        <div>
          <!-- Controles de ronda -->
          <div class="round-controls">
            <div class="round-display">
              Ronda
              <strong id="round-number">1</strong>
            </div>
            <button id="btn-next-turn" class="btn btn-next">
              ▶ Siguiente Turno
            </button>
            <div style="flex:1;"></div>
            <button id="btn-reset-combat" class="btn btn-sm" data-tooltip="Reiniciar ronda y turno activo">
              ↺ Reiniciar
            </button>
            <button id="btn-clear-all" class="btn btn-sm btn-danger" data-tooltip="Eliminar todos los combatientes">
              ✕ Limpiar
            </button>
          </div>

          <!-- Lista de combatientes -->
          <div id="combatant-list" class="combatant-list" role="list" aria-label="Orden de iniciativa"></div>
        </div>

        <!-- Columna derecha: condiciones -->
        <aside class="conditions-panel" aria-label="Referencia de condiciones">
          <h3>Condiciones de Combate</h3>
          <div id="conditions-list"></div>
        </aside>

      </div>

    </section>

    <!-- ─────────────────────────────────────────────────
         VISTA: MAPA
    ───────────────────────────────────────────────── -->
    <section id="view-map" class="view" role="tabpanel" aria-labelledby="tab-map">

      <div class="section-header">
        <span class="section-icon">✦</span>
        <h2>Mapa de Barovia</h2>
      </div>

      <!-- Layout del mapa -->
      <div class="map-layout">

        <!-- Mapa con pins -->
        <div>
          <div id="map-container" class="map-container">
            <img id="map-image" class="map-image" src="img/mapa-barovia.png"
              alt="Mapa de Barovia"
              onerror="this.src='img/mapa-placeholder.png'; this.onerror=null;">
            <div class="map-overlay"></div>
            <div id="map-pins" class="map-pins-layer" aria-label="Localizaciones del mapa"></div>
          </div>

          <!-- Leyenda -->
          <div class="map-legend">
            <div class="legend-item">
              <div class="legend-dot"></div>
              <span>Localización con carta del Tarot asignada</span>
            </div>
            <div class="legend-item" style="color:var(--clr-text-muted);">
              <span>Haz clic en un pin para ver los detalles</span>
            </div>
          </div>
        </div>

        <!-- Panel lateral de información -->
        <aside id="map-side-panel" class="map-sidebar" aria-label="Información de localización"></aside>

      </div>

    </section>

  </main>

  <!-- ══════════════════════════════════════════════════════
       MINI PLAYER FIJO (inferior)
  ══════════════════════════════════════════════════════ -->
  <footer id="mini-player" role="complementary" aria-label="Reproductor de audio">

    <!-- Ecualizador animado -->
    <div class="eq-container" aria-hidden="true">
      <div class="eq-bar paused" style="height:28px;"></div>
      <div class="eq-bar paused" style="height:28px;"></div>
      <div class="eq-bar paused" style="height:28px;"></div>
      <div class="eq-bar paused" style="height:28px;"></div>
      <div class="eq-bar paused" style="height:28px;"></div>
    </div>

    <!-- Info de lo que suena -->
    <div class="now-playing-info">
      <div class="now-playing-label">En reproducción</div>
      <div id="now-playing-name" class="now-playing-name empty">Nada en reproducción</div>
    </div>

    <!-- Input URL personalizada -->
    <div class="mp-url-wrapper">
      <input type="url" id="mp-url-input" class="mp-url-input"
        placeholder="URL de YouTube o ID del video..."
        aria-label="URL de YouTube para reproducir">
      <button id="mp-url-apply" class="btn btn-sm btn-primary" aria-label="Reproducir URL">
        ▶
      </button>
    </div>

    <!-- Botón stop -->
    <button id="mp-stop" class="mp-stop-btn" aria-label="Detener reproducción">
      ■ Stop
    </button>

  </footer>

  <!-- ══════════════════════════════════════════════════════
       SCRIPTS — orden de carga
  ══════════════════════════════════════════════════════ -->
  <script src="js/soundboard-data.js"></script>
  <script src="js/soundboard.js"></script>
  <script src="js/initiative.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
